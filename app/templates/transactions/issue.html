{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">
    
    <!-- Header -->
    <div class="border-b border-gray-200 dark:border-gray-700 pb-4">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Issue a Book</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Select an active member and an available book to create a new transaction.</p>
    </div>

    <!-- Issue Form -->
    <div class="bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
        <form action="{{ url_for('transactions.issue_book') }}" method="POST" class="space-y-6">
            
            <!-- Member Selection Dropdown -->
            <div>
                <label for="member_id" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Select Member</label>
                <select id="member_id" name="member_id" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                    <option value="" disabled selected>Choose a student or faculty member...</option>
                    {% for member in members %}
                        <option value="{{ member.id }}">{{ member.name }} ({{ member.email }}) - {{ member.tier | title }}</option>
                    {% else %}
                        <option value="" disabled>No active members found. Please add a member first.</option>
                    {% endfor %}
                </select>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Only active members with the 'member' role are shown.</p>
            </div>

            <!-- Book Selection Dropdown -->
            <div>
                <label for="book_id" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Select Book</label>
                <select id="book_id" name="book_id" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                    <option value="" disabled selected>Choose a book to issue...</option>
                    {% for book in books %}
                        <option value="{{ book.id }}">{{ book.title }} by {{ book.author }} ({{ book.available_copies }} available)</option>
                    {% else %}
                        <option value="" disabled>No books are currently available in the inventory.</option>
                    {% endfor %}
                </select>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Only books with at least 1 available physical copy are shown.</p>
            </div>

            <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
                <button type="submit" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 shadow-md transition-colors">
                    Issue Book to Member
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
