{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto space-y-6">
    <div class="border-b border-gray-200 pb-4">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Fine Policy Management</h1>
        <p class="text-sm text-gray-500">Adjust dynamic rates and grace periods.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for policy in policies %}
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-sm border border-gray-200">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">{{ policy.name }} ({{ policy.applies_to_tier | title }})</h3>
            <form action="{{ url_for('admin.manage_policies') }}" method="POST" class="space-y-4">
                <input type="hidden" name="policy_id" value="{{ policy.id }}">
                
                <div>
                    <label class="block text-sm font-medium">Rate per Day (₹)</label>
                    <input type="number" step="0.01" name="rate_per_day" value="{{ policy.rate_per_day }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium">Grace Days</label>
                    <input type="number" name="grace_days" value="{{ policy.grace_days }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium">Max Cap (₹)</label>
                    <input type="number" step="0.01" name="max_fine_cap" value="{{ policy.max_fine_cap }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm sm:text-sm">
                </div>
                
                <button type="submit" class="w-full bg-blue-600 text-white rounded-md py-2 px-4 hover:bg-blue-700">Save Policy</button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
