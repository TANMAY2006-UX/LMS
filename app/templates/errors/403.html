{% extends "base.html" %}

{% block title %}403 Forbidden — Libra{% endblock %}
{% block page_title %}{% endblock %}

{% block content %}
<style>
    @keyframes floatLock {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(-3deg); }
        100% { transform: translateY(0px) rotate(0deg); }
    }
    .error-icon {
        animation: floatLock 6s ease-in-out infinite;
        width: 64px; height: 64px;
        margin: 0 auto 24px auto;
        opacity: 0.8;
    }
    .error-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
    }
</style>

<div class="error-container page-transition">
    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    
    <h1 style="font-size: 24px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; letter-spacing: -0.02em;">The archive is restricted.</h1>
    
    <p style="color: var(--text-secondary); max-width: 420px; margin-bottom: 32px; font-size: 15px; line-height: 1.6;">
        Error 403. You lack the necessary institutional privileges to access this section of the library.
    </p>

    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary" style="padding: 10px 20px;">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Return to Dashboard
    </a>
</div>
{% endblock %}
