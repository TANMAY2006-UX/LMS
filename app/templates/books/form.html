{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl mx-auto space-y-6">

    <!-- Page Header -->
    <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-700 pb-4">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Add New Book</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Fetch metadata via ISBN or enter details manually.
            </p>
        </div>
    </div>

    <!-- ISBN Auto-Fetch Card (The Magic Box) -->
    <div
        class="p-6 bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 rounded-xl shadow-sm dark:from-gray-800 dark:to-gray-800 dark:border-gray-700">
        <label for="isbn-search" class="block mb-2 text-sm font-bold text-blue-900 dark:text-blue-300">⚡ Auto-Fetch Data
            (OpenLibrary API)</label>
        <div class="flex space-x-3">
            <input type="text" id="isbn-search"
                class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full sm:w-96 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                placeholder="e.g. 9780132350884 (Clean Code)">
            <button type="button" id="fetch-btn" onclick="fetchISBN()"
                class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 transition-colors shadow-md">
                Fetch Metadata
            </button>
        </div>
        <p id="fetch-status" class="mt-2 text-sm font-medium text-gray-500 hidden"></p>
    </div>

    <!-- The Main Form -->
    <form action="" method="POST"
        class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 sm:p-8">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Left Column: Cover Image Preview -->
            <div class="col-span-1 flex flex-col items-center justify-start space-y-4">
                <div
                    class="w-48 h-72 bg-gray-100 dark:bg-gray-700 rounded-lg border-2 border-dashed border-gray-300 dark:border-gray-600 flex items-center justify-center overflow-hidden relative shadow-inner">
                    <img id="cover-preview" src="" class="absolute inset-0 w-full h-full object-cover hidden"
                        alt="Book Cover">
                    <span id="cover-placeholder" class="text-gray-400 dark:text-gray-500 flex flex-col items-center">
                        <svg class="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                        No Cover
                    </span>
                </div>
                <input type="hidden" name="cover_url" id="cover_url">
            </div>

            <!-- Right Column: Input Fields -->
            <div class="col-span-1 md:col-span-2 space-y-5">

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">ISBN</label>
                    <input type="text" name="isbn" id="isbn"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                        required>
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Book Title</label>
                    <input type="text" name="title" id="title"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                        required>
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Author(s)</label>
                    <input type="text" name="author" id="author"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                        required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Publisher</label>
                        <input type="text" name="publisher" id="publisher"
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Published
                            Year</label>
                        <input type="number" name="published_year" id="published_year"
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                    </div>
                </div>
                <div class="col-span-1 md:col-span-2">
                    <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Description</label>
                    <textarea name="description" id="description" rows="4"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"></textarea>
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Initial Physical
                        Copies</label>
                    <input type="number" name="initial_copies" value="1" min="1"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                        required>
                    <p class="text-xs text-gray-500 mt-1">How many physical books are you putting on the shelf right
                        now?</p>
                </div>

            </div>
        </div>

        <div class="mt-8 border-t border-gray-200 dark:border-gray-700 pt-6 flex justify-end">
            <button type="submit"
                class="text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:ring-green-300 font-medium rounded-lg text-sm px-8 py-3 dark:bg-green-600 dark:hover:bg-green-700 focus:outline-none dark:focus:ring-green-800 shadow-lg">
                Save Book to Inventory
            </button>
        </div>
    </form>
</div>

<!-- JavaScript to handle the OpenLibrary API Auto-Fetch -->
<script>
    async function fetchISBN() {
        const isbnInput = document.getElementById('isbn-search').value;
        const statusText = document.getElementById('fetch-status');
        const btn = document.getElementById('fetch-btn');

        if (!isbnInput) {
            alert("Please enter an ISBN first.");
            return;
        }

        // UI Loading State
        btn.disabled = true;
        btn.innerHTML = `Fetching...`;
        statusText.classList.remove('hidden', 'text-red-600', 'text-green-600');
        statusText.classList.add('text-blue-600');
        statusText.innerText = "Contacting OpenLibrary Database...";

        try {
            // Call our Flask backend API route
            const response = await fetch(`/books/api/fetch-isbn?isbn=${isbnInput}`);
            const result = await response.json();

            if (result.success) {
                // Populate the form fields with the fetched data
                document.getElementById('isbn').value = isbnInput;
                document.getElementById('title').value = result.data.title || '';
                document.getElementById('author').value = result.data.author || '';
                document.getElementById('publisher').value = result.data.publisher || '';
                document.getElementById('published_year').value = result.data.published_year || '';

                // Handle Cover Image
                if (result.data.cover_url) {
                    document.getElementById('cover_url').value = result.data.cover_url;
                    document.getElementById('cover-preview').src = result.data.cover_url;
                    document.getElementById('cover-preview').classList.remove('hidden');
                    document.getElementById('cover-placeholder').classList.add('hidden');
                }

                // Success UI State
                statusText.classList.remove('text-blue-600');
                statusText.classList.add('text-green-600');
                statusText.innerText = "✅ Book data loaded successfully!";
            } else {
                // Error UI State
                statusText.classList.remove('text-blue-600');
                statusText.classList.add('text-red-600');
                statusText.innerText = "❌ " + result.error;
            }
        } catch (error) {
            statusText.classList.remove('text-blue-600');
            statusText.classList.add('text-red-600');
            statusText.innerText = "❌ Network error occurred.";
        } finally {
            btn.disabled = false;
            btn.innerHTML = `Fetch Metadata`;
        }
    }
</script>
{% endblock %}
