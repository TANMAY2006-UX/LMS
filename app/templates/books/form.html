{% extends "base.html" %}

{% block page_title %}Add Book{% endblock %}

{% block content %}
<div style="max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px;">

    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h1>Add New Book</h1>
            <p>Fetch metadata via ISBN or enter details manually.</p>
        </div>
    </div>

    <!-- ISBN Auto-Fetch -->
    <div class="card" style="background: var(--surface-raised); border-color: var(--border);">
        <label for="isbn-search" class="form-label">Auto-Fetch Data (OpenLibrary API)</label>
        <div style="display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap;">
            <input type="text" id="isbn-search" class="form-input" style="max-width: 400px; flex: 1;" placeholder="e.g. 9780132350884 (Clean Code)">
            <button type="button" id="fetch-btn" onclick="fetchISBN()" class="btn btn-secondary">
                <svg style="width: 14px; height: 14px; margin-right: 6px; stroke: currentColor; fill: none; stroke-width: 2;" viewBox="0 0 24 24"><polyline points="13 2 13 9 20 9"/><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg>
                Fetch Metadata
            </button>
        </div>
        <p id="fetch-status" style="margin-top: 8px; font-size: 13px; font-weight: 500; display: none;"></p>
    </div>

    <!-- The Main Form -->
    <form action="" method="POST" class="card" style="padding: 32px;">

        <div style="display: grid; grid-template-columns: 200px 1fr; gap: 48px; align-items: start;">
            <!-- Left Column: Cover Image Preview -->
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div style="width: 100%; aspect-ratio: 2/3; background: var(--surface-raised); border: 1px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
                    <img id="cover-preview" src="" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none;" alt="Book Cover">
                    <div id="cover-placeholder" style="color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center;">
                        <svg style="width: 32px; height: 32px; fill: none; stroke: currentColor; stroke-width: 1.5; margin-bottom: 8px;" viewBox="0 0 24 24">
                            <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <span style="font-size: 11px; font-weight: 500;">No Cover</span>
                    </div>
                </div>
                <input type="hidden" name="cover_url" id="cover_url">
            </div>

            <!-- Right Column: Input Fields -->
            <div style="display: flex; flex-direction: column; gap: 24px;">

                <div>
                    <label class="form-label">ISBN</label>
                    <input type="text" name="isbn" id="isbn" class="form-input" required>
                </div>

                <div>
                    <label class="form-label">Book Title</label>
                    <input type="text" name="title" id="title" class="form-input" required>
                </div>

                <div>
                    <label class="form-label">Author(s)</label>
                    <input type="text" name="author" id="author" class="form-input" required>
                </div>

                <div>
                    <label class="form-label">Category</label>
                    <select name="category_id" id="category_id" class="form-input" required>
                        <option value="" disabled selected>Select a category...</option>
                        {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div>
                        <label class="form-label">Publisher</label>
                        <input type="text" name="publisher" id="publisher" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Published Year</label>
                        <input type="number" name="published_year" id="published_year" class="form-input">
                    </div>
                </div>
                
                <div>
                    <label class="form-label">Description</label>
                    <textarea name="description" id="description" rows="4" class="form-input" style="resize: vertical;"></textarea>
                </div>

                <div>
                    <label class="form-label">Initial Physical Copies</label>
                    <input type="number" name="initial_copies" value="1" min="1" class="form-input" style="max-width: 150px;" required>
                    <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">How many physical books are you putting on the shelf right now?</p>
                </div>

            </div>
        </div>

        <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-primary" style="padding: 10px 24px;">
                Save Book to Inventory
            </button>
        </div>
    </form>
</div>

<script>
    async function fetchISBN() {
        const isbnInput = document.getElementById('isbn-search').value;
        const statusText = document.getElementById('fetch-status');
        const btn = document.getElementById('fetch-btn');

        if (!isbnInput) {
            alert("Please enter an ISBN first.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `Fetching...`;
        statusText.style.display = 'block';
        statusText.style.color = 'var(--accent)';
        statusText.innerText = "Contacting OpenLibrary Database...";

        try {
            const response = await fetch(`/books/api/fetch-isbn?isbn=${isbnInput}`);
            const result = await response.json();

            if (result.success) {
                document.getElementById('isbn').value = isbnInput;
                document.getElementById('title').value = result.data.title || '';
                document.getElementById('author').value = result.data.author || '';
                document.getElementById('publisher').value = result.data.publisher || '';
                document.getElementById('published_year').value = result.data.published_year || '';

                if (result.data.suggested_category) {
                    statusText.innerText = `✅ Data loaded! OpenLibrary suggests this is: "${result.data.suggested_category}". Please select your closest matching official category.`;
                }

                if (result.data.cover_url) {
                    document.getElementById('cover_url').value = result.data.cover_url;
                    document.getElementById('cover-preview').src = result.data.cover_url;
                    document.getElementById('cover-preview').style.display = 'block';
                    document.getElementById('cover-placeholder').style.display = 'none';
                }

                statusText.style.color = 'var(--success)';
                statusText.innerText = "✅ Book data loaded successfully!";
            } else {
                statusText.style.color = 'var(--danger)';
                statusText.innerText = "❌ " + result.error;
            }
        } catch (error) {
            statusText.style.color = 'var(--danger)';
            statusText.innerText = "❌ Network error occurred.";
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<svg style="width: 14px; height: 14px; margin-right: 6px; stroke: currentColor; fill: none; stroke-width: 2;" viewBox="0 0 24 24"><polyline points="13 2 13 9 20 9"/><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg>Fetch Metadata`;
        }
    }
</script>
{% endblock %}
