{% extends "base.html" %}

{% block page_title %}Books{% endblock %}

{% block content %}
<div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div>
        <h1>Books & Inventory</h1>
        <p>Browse and manage the library catalog.</p>
    </div>
    
    {% if current_user.role in ['admin', 'librarian'] %}
    <div>
        <a href="{{ url_for('books.add_book') }}" class="btn btn-primary">
            <svg class="nav-icon" style="width: 14px; height: 14px; margin-right: 6px; stroke-width: 2;" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Add Book
        </a>
    </div>
    {% endif %}
</div>

<div class="filter-bar" style="max-width: 600px;">
    <svg style="width: 18px; height: 18px; stroke: var(--text-muted); fill: none; stroke-width: 2;" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input 
        type="search" 
        name="q" 
        class="form-input" 
        style="border: none; background: transparent; box-shadow: none; padding: 0; font-size: 14px;"
        placeholder="Search by Title, Author, or ISBN..."
        hx-get="{{ url_for('books.index') }}"
        hx-trigger="keyup changed delay:300ms, search"
        hx-target="#search-results"
        hx-indicator=".htmx-indicator"
    >
    <div class="htmx-indicator">
        <svg style="width: 16px; height: 16px; stroke: var(--accent); fill: none; stroke-width: 2; animation: spin 1s linear infinite;" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-dasharray="30 30" stroke-linecap="round"></circle></svg>
    </div>
</div>

<style>
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>

<div id="search-results" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px;">
    {% include "books/partials/book_grid.html" %}
</div>
{% endblock %}
