{% extends "base.html" %}

{% block title %}Sign In — Libra{% endblock %}

{% block content %}
<div style="width: 100%; max-width: 380px;">
    {# ── Minimal branding above the login box ── #}
    <div style="text-align: center; margin-bottom: 32px;">
        <div style="font-size: 24px; font-weight: 600; letter-spacing: -0.02em; color: var(--accent); margin-bottom: 8px;">
            libra
        </div>
        <div style="font-size: 13px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase;">
            Library Management
        </div>
    </div>

    <div class="card" style="padding: 32px 28px;">
        <h1 style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 24px; text-align: center; letter-spacing: -0.01em;">
            Sign in to your account
        </h1>
        
        <form method="POST" action="{{ url_for('auth.login') }}" style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label for="email" class="form-label">Email Address</label>
                <input type="email" name="email" id="email" class="form-input" placeholder="admin@libra.edu" required autofocus>
            </div>
            
            <div>
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 10px; font-size: 14px; margin-top: 8px;">
                Sign In
            </button>
        </form>
    </div>
    
    <div style="text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-muted);">
        Don't have an account? Contact the librarian.
    </div>
</div>
{% endblock %}
